name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check (${{ matrix.os }}, node-${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ["20", "22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Full npm check
        run: npm run check

      - name: Bash syntax check
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          bash -n update.sh
          bash -n uninstall.sh

      - name: PowerShell parser check
        shell: pwsh
        run: |
          $files = @("install.ps1", "update.ps1", "uninstall.ps1")
          foreach ($f in $files) {
            $content = Get-Content $f -Raw
            $null = [System.Management.Automation.PSParser]::Tokenize(
              $content, [ref]$null
            )
            Write-Host "$f : syntax OK"
          }

      - name: Git whitespace check
        run: git diff-tree --check --no-commit-id --root -r HEAD
