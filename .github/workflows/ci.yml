name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check (${{ matrix.os }}, node-${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ["20", "22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so whitespace checks can compare against the PR base
          # (shallow depth-1 merge commits look like root commits and otherwise
          # re-check the entire tree, including historical trailing blanks).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Full npm check
        run: npm run check

      - name: Bash syntax check
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          bash -n update.sh
          bash -n uninstall.sh

      - name: PowerShell parser check
        shell: pwsh
        run: |
          $files = @("install.ps1", "update.ps1", "uninstall.ps1")
          foreach ($f in $files) {
            $content = Get-Content $f -Raw
            $null = [System.Management.Automation.PSParser]::Tokenize(
              $content, [ref]$null
            )
            Write-Host "$f : syntax OK"
          }

      - name: Git whitespace check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "Checking whitespace on PR range $BASE...$HEAD"
            git diff --check "$BASE...$HEAD"
          else
            # Push to main: check the tip commit only
            echo "Checking whitespace on tip commit $(git rev-parse --short HEAD)"
            git diff-tree --check --no-commit-id -r HEAD
          fi
